<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculteur de point du jeu 421</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="main.js"></script>
</head>

<body class="m-2">
  <h1 class="text-3xl font-bold">
    Bienvenue sur le calculateur de points du jeu 421
  </h1>

  <div class="mb-3">
    <label for="basic-url" class="form-label">Entrez la valeur du premier dé</label>
    <div class="input-group">
      <input type="text" class="form-control" id="first-die" aria-describedby="basic-addon3 basic-addon4">
    </div>
  </div>

  <div class="mb-3">
    <label for="basic-url" class="form-label">Entrez la valeur du deuxième dé</label>
    <div class="input-group">
      <input type="text" class="form-control" id="second-die" aria-describedby="basic-addon3 basic-addon4">
    </div>
  </div>

  <div class="mb-3">
    <label for="basic-url" class="form-label">Entrez la valeur du troisème dé</label>
    <div class="input-group">
      <input type="text" class="form-control" id="third-die" aria-describedby="basic-addon3 basic-addon4">
    </div>
  </div>

  <div class="d-inline-flex gap-2 text-success">
    <p>La valeur en jeton est de:</p>
    <p id="result">0</p>
    <p>pts</p>
  </div>

  <div>
    <button id="reset-button" type="button" class="btn btn-secondary">Reset</button>
  </div>
</body>

</html>
